version: '3.8'

services:
  ultimate-rag-api-dev:
    build: .
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - RAG_DB_PATH=/app/chroma_db_ultimate
      - RAG_MAX_WORKERS=4
      - RAG_LOG_LEVEL=INFO
    volumes:
      - ./chroma_db_ultimate:/app/chroma_db_ultimate
      - ./models:/app/models
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx-dev:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - ultimate-rag-api-dev
    restart: unless-stopped

  redis-dev:
    image: redis:alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

